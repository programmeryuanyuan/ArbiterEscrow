<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0b0b0e"/>
    </linearGradient>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="72" fill="url(#bg)"/>

  <!-- Outer purple ring -->
  <rect x="8" y="8" width="384" height="384" rx="66"
        fill="none" stroke="#a855f7" stroke-width="2" opacity="0.35"/>

  <!-- Hexagon -->
  <polygon points="200,52 330,126 330,274 200,348 70,274 70,126"
           fill="none" stroke="url(#pg)" stroke-width="2.5" opacity="0.5" filter="url(#glow)"/>

  <!-- Inner hexagon fill -->
  <polygon points="200,72 310,136 310,264 200,328 90,264 90,136"
           fill="#a855f7" opacity="0.07"/>

  <!-- A lettermark -->
  <text x="200" y="282"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="220"
        font-weight="700"
        fill="url(#pg)"
        text-anchor="middle"
        filter="url(#glow)">A</text>

  <!-- Certified badge — top right -->
  <circle cx="308" cy="106" r="46" fill="#0b0b0e"/>
  <circle cx="308" cy="106" r="38" fill="#00ff88" opacity="0.12"/>
  <circle cx="308" cy="106" r="34" fill="none" stroke="#00ff88" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M291 106 L304 120 L326 90"
        stroke="#00ff88" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" filter="url(#glow)"/>
</svg>
